[unix_http_server]
file=/tmp/test_supervisor.sock

[supervisord]
logfile=/tmp/supervisord_test.log
loglevel=debug
user=root
childlogdir=/tmp

[supervisorctl]
serverurl=unix:///tmp/test_supervisor.sock

[program:echo_test]
command=/bin/echo "Hello from supervised process"
autorestart=false
stdout_logfile=/tmp/echo_test.log
redirect_stderr=true

[program:sleep_test]
command=/bin/sleep 300
autorestart=true
stdout_logfile=/tmp/sleep_test.log
redirect_stderr=true
